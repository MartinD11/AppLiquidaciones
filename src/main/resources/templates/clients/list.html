<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>RematePro - Clientes</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Estilos del Modal */
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center; }
        .modal-content { background:white; padding:30px; border-radius:10px; width:400px; position:relative; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .close-btn { position:absolute; top:15px; right:20px; cursor:pointer; font-size:24px; color:#aaa; }
        .close-btn:hover { color:#333; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-submit { background:#10b981; color:white; border:none; padding:10px; width:100%; border-radius:5px; cursor:pointer; font-weight:bold; }

        /* Estilos de la tabla */
        .tabla-card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-top: 20px; }
        .btn-nuevo { background: #111c2d; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block; transition: 0.2s;}
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; background: #f8f9fa; border-bottom: 2px solid #e2e8f0; color: #4a5568; font-size: 13px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #e2e8f0; color: #1a202c; }
        .btn-accion { cursor: pointer; background: none; border: none; margin-right: 10px; color: #a0aec0; font-size: 16px; }
        .btn-accion:hover { color: #3b82f6; }
        .btn-eliminar:hover { color: #e53e3e; }
    </style>
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar(activePage='clients')}"></div>

<div class="main-wrapper">
    <div th:replace="~{fragments/header :: header('Gestión de Clientes')}"></div>

    <div class="content-area">
        <a th:href="@{/clients/new}" class="btn-nuevo"><i class="fa-solid fa-plus"></i> Nuevo Cliente</a>

        <div class="tabla-card">
            <table th:if="${clients != null && !clients.isEmpty()}">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre y Apellido</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="client : ${clients}">
                    <td th:text="${client.id}">1</td>
                    <td th:text="${client.name + ' ' + client.lastName}">Juan Perez</td>
                    <td>
                        <button class="btn-accion btn-editar" title="Editar"
                                th:data-id="${client.id}"
                                th:data-name="${client.name}"
                                th:data-lastname="${client.lastName}">
                            <i class="fa-solid fa-pen"></i>
                        </button>

                        <a th:href="@{/clients/delete/{id}(id=${client.id})}" class="btn-accion btn-eliminar" title="Eliminar">
                            <i class="fa-solid fa-trash"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="editModal" class="modal-overlay">
    <div class="modal-content">
        <span id="closeModalBtn" class="close-btn">&times;</span>
        <h2>Editar Cliente</h2>
        <form id="editForm" method="post">
            <div class="form-group">
                <label>Nombre:</label>
                <input type="text" id="editName" name="name" required>
            </div>
            <div class="form-group">
                <label>Apellido:</label>
                <input type="text" id="editLastName" name="lastName" required>
            </div>
            <button type="submit" class="btn-submit">Guardar Cambios</button>
        </form>
    </div>
</div>

<div id="deleteModal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="color: #e53e3e;">¿Estás seguro?</h2>
        <p>Esta acción no se puede deshacer. ¿Deseas eliminar a este cliente?</p>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button id="cancelDeleteBtn" style="flex: 1; padding: 10px; border: none; background: #e2e8f0; cursor: pointer;">Cancelar</button>
            <a id="confirmDeleteBtn" href="#" style="flex: 1; padding: 10px; border: none; background: #e53e3e; color: white; text-decoration: none; text-align: center;">Eliminar</a>
        </div>
    </div>
</div>

<script th:src="@{/js/modal.js}"></script>

</body>
</html>
