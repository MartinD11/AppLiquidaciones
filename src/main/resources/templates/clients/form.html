<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>RematePro - Nuevo Cliente</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar(activePage='clients')}"></div>

<div class="main-wrapper">
    <div th:replace="~{/fragments/header :: header('Registrar Nuevo Cliente')}"></div>

    <div class="content-area">
        <div class="form-card">
            <form th:action="@{/clients/save}" th:object="${client}" method="post">

                <div class="form-group">
                    <label>Nombre:</label>
                    <input type="text" th:field="*{name}" placeholder="Ej. Juan" required>
                </div>

                <div class="form-group">
                    <label>Apellido:</label>
                    <input type="text" th:field="*{lastName}" placeholder="Ej. Pérez" required>
                </div>

                <button type="submit" class="btn-guardar">
                    <i class="fa-solid fa-save"></i> Guardar Cliente
                </button>

            </form>

            <a th:href="@{/clients}" class="btn-cancelar">
                Cancelar y volver a la lista
            </a>
        </div>
    </div>
</div>

</body>
</html>
