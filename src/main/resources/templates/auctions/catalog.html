<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>RematePro - Armar Catálogo</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=5)}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .header-catalogo { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .titulo-remate { font-size: 24px; color: #1e293b; margin: 0; }
        .badge-count { background: #3b82f6; color: white; padding: 5px 10px; border-radius: 20px; font-size: 14px; }
        .card-asignados { border-top: 4px solid #8b5cf6; margin-bottom: 30px; }
        .card-disponibles { border-top: 4px solid #10b981; }
        .btn-volver { background: #e2e8f0; color: #4a5568; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; }
        .btn-quitar { color: #ef4444; background: #fee2e2; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; text-decoration: none; }
        .checkbox-lote { width: 18px; height: 18px; cursor: pointer; }
        .form-group { margin-bottom: 15px; }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #475569;
            font-size: 14px;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background-color: #fff;
            font-size: 14px;
            color: #334155;
            transition: all 0.2s ease;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 16px;
        }

        select:focus, input[type="number"]:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        /* Para darle un toque extra al hover */
        select:hover {
            border-color: #94a3b8;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar(activePage='auctions')}"></div>

<div class="main-wrapper">
    <div th:replace="~{fragments/header :: header('Armado de Catálogo')}"></div>

    <div class="content-area">

        <div class="header-catalogo">
            <h2 class="titulo-remate">
                <i class="fa-solid fa-gavel" style="color: #8b5cf6;"></i>
                Catálogo: <span th:text="${#temporals.format(auction.date, 'dd/MM/yyyy')}"></span>
            </h2>
            <a th:href="@{/auctions}" class="btn-volver"><i class="fa-solid fa-arrow-left"></i> Volver</a>
        </div>

        <div class="tabla-card card-asignados">
            <h3><i class="fa-solid fa-boxes-stacked"></i> Lotes en este Remate
                <span class="badge-count" th:text="${auction.soldProducts.size()}">0</span>
            </h3>
            <table>
                <thead>
                <tr>
                    <th>Lote</th>
                    <th>Dueño</th>
                    <th>Nombre</th>
                    <th>Estado</th>
                    <th>Precio Final</th>
                    <th>Comprador</th> <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="product : ${auction.soldProducts}">
                    <td th:text="${product.lotNumber}">1</td>
                    <td th:text="${product.seller != null ? product.seller.name + ' ' + product.seller.lastName : '-'}">Dueño</td>
                    <td th:text="${product.name}">...</td>
                    <td th:text="${product.status}">STATUS</td>
                    <td th:text="${product.salePrice != null ? '$' + product.salePrice : '-'}">-</td>

                    <td th:text="${product.buyer != null ? product.buyer.name + ' ' + product.buyer.lastName : '-'}">-</td>

                    <td>
                        <button type="button" class="btn-accion btn-editar-lote"
                                th:data-id="${product.id}"
                                th:data-price="${product.salePrice}"
                                th:data-status="${product.status}"
                                th:data-buyer="${product.buyer != null ? product.buyer.id : ''}"> <i class="fa-solid fa-pen-to-square"></i>
                        </button>
                        <a th:href="@{/auctions/{id}/remove-product/{productId}(id=${auction.id}, productId=${product.id})}" class="btn-quitar"><i class="fa-solid fa-trash"></i></a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="tabla-card card-disponibles">
            <h3><i class="fa-solid fa-warehouse"></i> Inventario Disponible</h3>
            <form th:action="@{/auctions/{id}/add-products(id=${auction.id})}" method="post">
                <table th:if="${availableProducts != null && !availableProducts.isEmpty()}">
                    <thead>
                    <tr>
                        <th><input type="checkbox" id="selectAll"></th>
                        <th>ID</th><th>Lote</th><th>Dueño</th><th>Nombre</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="product : ${availableProducts}">
                        <td><input type="checkbox" name="productIds" th:value="${product.id}" class="producto-checkbox"></td>
                        <td th:text="${product.id}"></td>
                        <td th:text="${product.lotNumber}"></td>
                        <td th:text="${product.seller != null ? product.seller.name + ' ' + product.seller.lastName : '-'}"></td>
                        <td th:text="${product.name}"></td>
                    </tr>
                    </tbody>
                </table>
                <button type="submit" class="btn-guardar">Agregar Selección</button>
            </form>
        </div>
    </div>
</div>

<div id="editLoteModal" class="modal-overlay" style="display: none;">
    <div class="modal-content" style="max-width: 400px;">
        <span id="closeEditModalBtn" class="close-btn">&times;</span>
        <h2>Finalizar Venta</h2>
        <form id="editLoteForm" method="post">
            <input type="hidden" name="auctionId" th:value="${auction.id}">

            <div class="form-group">
                <label>Precio Final:</label>
                <input type="number" step="0.01" name="salePrice" id="editSalePrice" required>
            </div>

            <div class="form-group">
                <label>Comprador:</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <select name="buyerId" id="editBuyer" style="flex: 1; margin: 0; height: 42px;">
                        <option value="">Seleccione un comprador...</option>
                        <option th:each="client : ${clients}"
                                th:value="${client.id}"
                                th:text="${client.name + ' ' + client.lastName}">
                        </option>
                    </select>
                    <button type="button" id="openClientModalBtn" class="btn-guardar"
                            style="width: 42px; height: 42px; margin: 0; display: flex; align-items: center; justify-content: center; padding: 0; font-size: 20px;">
                        +
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label>Estado:</label>
                <select name="status" id="editStatus">
                    <option value="NOT_SOLD">No Vendido</option>
                    <option value="SOLD">Vendido</option>
                </select>
            </div>
            <button type="submit" class="btn-guardar" style="width: 100%;">Guardar</button>
        </form>
    </div>
</div>
<div id="newClientModal" class="modal-overlay" style="display: none;">
    <div class="modal-content" style="max-width: 400px;">
        <span id="closeClientModalBtn" class="close-btn">&times;</span>
        <h2>Nuevo Comprador</h2>
        <form id="newClientForm">
            <div class="form-group">
                <label>Nombre:</label>
                <input type="text" id="clientName" required>
            </div>
            <div class="form-group">
                <label>Apellido:</label>
                <input type="text" id="clientLastName" required>
            </div>
            <button type="button" id="saveClientBtn" class="btn-guardar" style="width: 100%;">Guardar Cliente</button>
        </form>
    </div>
</div>

<script th:src="@{/js/catalog-auctions.js}"></script>
</body>
</html>
