<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>RematePro - Productos</title>
    <link rel="stylesheet" th:href="@{/css/style.css?v=3}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Estilos específicos de esta vista (podés moverlos a style.css luego) */
        .search-card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-top: 20px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .search-card input { padding: 10px; border: 1px solid #e2e8f0; border-radius: 5px; outline: none; flex: 1; min-width: 150px; }
        .search-card input:focus { border-color: #3b82f6; }
        .btn-buscar { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-buscar:hover { background: #2563eb; }
        .btn-limpiar { background: #e2e8f0; color: #4a5568; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; }
        .btn-limpiar:hover { background: #cbd5e1; }

        .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-vendido { background: #d1fae5; color: #065f46; }
        .badge-novendido { background: #f1f5f9; color: #475569; }

        .inline-form { display: inline-block; margin: 0; }
        .btn-estado { cursor: pointer; background: none; border: none; font-size: 16px; margin-right: 10px; }
        .btn-vender { color: #10b981; }
        .btn-vender:hover { color: #059669; }
        .btn-novender { color: #64748b; }
        .btn-novender:hover { color: #475569; }
    </style>
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar(activePage='products')}"></div>

<div class="main-wrapper">
    <div th:replace="~{fragments/header :: header('Gestión de Productos')}"></div>

    <div class="content-area">

        <div th:if="${error != null}" style="background: #fee2e2; color: #991b1b; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
            <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}"></span>
        </div>

        <a th:href="@{/products/new}" class="btn-nuevo"><i class="fa-solid fa-plus"></i> Nuevo Producto</a>

        <form th:action="@{/products}" method="get" class="search-card">
            <input type="number" name="searchId" placeholder="Buscar por ID..." th:value="${param.searchId}">
            <input type="text" name="searchName" placeholder="Buscar por Nombre..." th:value="${param.searchName}">

            <select name="searchClientId" style="padding: 10px; border: 1px solid #e2e8f0; border-radius: 5px; outline: none; flex: 1; min-width: 200px;">
                <option value="">-- Todos los Clientes --</option>
                <option th:each="client : ${clients}"
                        th:value="${client.id}"
                        th:text="${client.name + ' ' + client.lastName}"
                        th:selected="${param.searchClientId != null and param.searchClientId[0] == client.id.toString()}">
                </option>
            </select>

            <button type="submit" class="btn-buscar"><i class="fa-solid fa-search"></i> Buscar</button>
            <a th:href="@{/products}" class="btn-limpiar">Limpiar</a>
        </form>

        <div class="tabla-card">
            <table th:if="${products != null && !products.isEmpty()}">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Lote</th>
                    <th>Nombre</th>
                    <th>Precio Base</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.id}">1</td>
                    <td th:text="${product.lotNumber}">10</td>
                    <td th:text="${product.name}">TV LG</td>
                    <td th:text="${product.basePrice != null ? '$' + product.basePrice : '-'}">$50000</td>
                    <td>
                        <span th:classappend="${product.status != null && product.status.name() == 'VENDIDO'} ? 'badge badge-vendido' : 'badge badge-novendido'"
                              th:text="${product.status != null ? product.status : 'NO_VENDIDO'}">
                        </span>
                    </td>
                    <td>
                        <button class="btn-accion btn-editar" title="Editar"
                                th:data-id="${product.id}"
                                th:data-name="${product.name}"
                                th:data-lot="${product.lotNumber}"
                                th:data-price="${product.basePrice}">
                            <i class="fa-solid fa-pen"></i>
                        </button>

                        <button class="btn-accion btn-eliminar btn-delete-modal" title="Eliminar"
                                th:data-id="${product.id}"
                                th:data-name="${product.name}">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${products == null || products.isEmpty()}" style="text-align: center; padding: 20px; color: #718096;">
                No hay productos cargados o no coinciden con tu búsqueda.
            </div>
        </div>
    </div>
</div>

<div id="editModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <span id="closeModalBtn" class="close-btn">&times;</span>
        <h2>Editar Producto</h2>
        <form id="editForm" method="post">
            <div class="form-group">
                <label>Nombre:</label>
                <input type="text" id="editName" name="name" required>
            </div>
            <div class="form-group">
                <label>Lote Nro:</label>
                <input type="number" id="editLot" name="lotNumber">
            </div>
            <div class="form-group">
                <label>Precio Base:</label>
                <input type="number" step="0.01" id="editPrice" name="basePrice">
            </div>
            <button type="submit" class="btn-guardar" style="width: 100%;">Guardar Cambios</button>
        </form>
    </div>
</div>

<div id="deleteModal" class="modal-overlay" style="display: none;">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
        <h2 style="color: #ef4444; margin-bottom: 15px;">
            <i class="fa-solid fa-triangle-exclamation"></i> Confirmar Eliminación
        </h2>
        <p style="color: #4a5568; margin-bottom: 25px;">
            ¿Estás seguro de que deseas eliminar el producto <strong id="deleteProductName"></strong>? Esta acción no se puede deshacer.
        </p>
        <div style="display: flex; justify-content: space-between; gap: 10px;">
            <button type="button" id="closeDeleteModalBtn" class="btn-limpiar" style="flex: 1; border: none; cursor: pointer;">Cancelar</button>
            <a id="confirmDeleteBtn" href="#" class="btn-guardar" style="background: #ef4444; flex: 1; text-align: center; text-decoration: none;">
                Sí, Eliminar
            </a>
        </div>
    </div>
</div>

<script th:src="@{/js/modal-products.js}"></script>

</body>
</html>
