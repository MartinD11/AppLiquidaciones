<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>RematePro - Nuevo Producto</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=4)}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .form-card { background: white; border-radius: 10px; padding: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 800px; margin: 0 auto; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #4a5568; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 5px; outline: none; }
        .form-group input:focus, .form-group select:focus { border-color: #3b82f6; }
        .form-actions { margin-top: 30px; display: flex; justify-content: space-between; align-items: center; }
        .btn-cancelar { color: #64748b; text-decoration: none; font-weight: bold; }
        .btn-cancelar:hover { color: #334155; }
        .btn-guardar { background: #3b82f6; color: white; border: none; padding: 12px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn-guardar:hover { background: #2563eb; }
        .full-width { grid-column: span 2; }
    </style>
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar(activePage='products')}"></div>

<div class="main-wrapper">
    <div th:replace="~{fragments/header :: header('Nuevo Producto')}"></div>

    <div class="content-area">
        <div class="form-card">
            <h2>Datos del Lote (Inventario)</h2>
            <hr style="border: 1px solid #f1f5f9; margin-bottom: 20px;">

            <form th:action="@{/products/save}" th:object="${product}" method="post">

                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>Nombre del Producto *</label>
                        <input type="text" th:field="*{name}" required placeholder="Ej. Lote de herramientas antiguas" maxlength="100">
                    </div>

                    <div class="form-group full-width">
                        <label>Cliente Vendedor (Propietario) *</label>
                        <select th:field="*{seller.id}" required>
                            <option value="" disabled selected>-- Seleccionar Cliente --</option>
                            <option th:each="client : ${clients}"
                                    th:value="${client.id}"
                                    th:text="${client.name + ' ' + client.lastName}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Número de Lote *</label>
                        <input type="number" th:field="*{lotNumber}" required placeholder="Ej. 1">
                    </div>

                    <div class="form-group">
                        <label>Precio Base (Opcional)</label>
                        <input type="number" step="0.01" th:field="*{basePrice}" placeholder="Ej. 50000.00">
                    </div>
                </div>

                <div class="form-actions">
                    <a th:href="@{/products}" class="btn-cancelar">Volver a la lista</a>
                    <button type="submit" class="btn-guardar">Guardar en Inventario</button>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
